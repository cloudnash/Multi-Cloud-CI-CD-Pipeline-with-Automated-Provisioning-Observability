global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "aws-eks-pods"
    kubernetes_sd_configs:
      - role: pod
        api_server: https://AWS_EKS_ENDPOINT
        tls_config:
          insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__address__]
        target_label: cloud
        replacement: aws

  - job_name: "gcp-gke-pods"
    kubernetes_sd_configs:
      - role: pod
        api_server: https://GCP_GKE_ENDPOINT
        tls_config:
          insecure_skip_verify: false
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__address__]
        target_label: cloud
        replacement: gcp

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter-aws:9100", "node-exporter-gcp:9100"]
